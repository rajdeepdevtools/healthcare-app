    <script>
      (function () {
        if (!('serviceWorker' in navigator) || !navigator.serviceWorker.getRegistrations) return;
        navigator.serviceWorker.getRegistrations()
          .then(function (registrations) {
            if (!registrations.length) return;
            return Promise.all(registrations.map(function (registration) { return registration.unregister(); }))
              .then(function () {
                try {
                  if (navigator.serviceWorker.controller && sessionStorage.getItem('clinic-sw-refresh') !== 'done') {
                    sessionStorage.setItem('clinic-sw-refresh', 'done');
                    window.location.reload();
                  }
                } catch {}
              });
          })
          .catch(function () {});
      }());
    </script>
    <script>
      (function () {
        function showRuntimeError(message) {
          var root = document.getElementById('root');
          if (!root) return;
          root.innerHTML = '<div style="min-height:100vh;padding:32px;font-family:Arial,sans-serif;background:#fff7ed;color:#111827"><h1 style="margin:0 0 12px;font-size:24px">App loading error</h1><pre style="white-space:pre-wrap;background:#111827;color:#fff;padding:16px;border-radius:8px">' + String(message).replace(/[<>&]/g, function (char) { return ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' })[char]; }) + '</pre></div>';
        }
        window.addEventListener('error', function (event) { showRuntimeError(event.message || 'Unknown error'); });
        window.addEventListener('unhandledrejection', function (event) { showRuntimeError(event.reason && (event.reason.stack || event.reason.message) || event.reason || 'Unknown promise error'); });
      }());
    </script>
    <meta
      name="description"
      content="Health Care & Wellness Clinic offers gentle, root-cause healing using the Bach Flower Method for emotional balance, stress, sleep, and chronic conditions."
    />
